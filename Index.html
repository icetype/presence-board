<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/line-seed-jp@0.0.5/line-seed-jp.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">

  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --sub: #6b7280;
      --line: #e2e8f0;
      --accent: #4b5563;
      --accent2: #374151;
      --ok: #15803d;
      --danger: #b91c1c;
      --radius: 20px;

      --presence-location-size: 19px;
      --presence-members-size: 17px;

      --button-font-size: 22px;
      --button-min-height: 66px;
      --button-padding-y: 10px;
      --button-padding-x: 8px;
      --button-min-col-width: 120px;

      --press-depth: 6px;
      --card-rest-shadow: 0 10px 18px rgba(15, 23, 42, 0.08), 0 3px 6px rgba(15, 23, 42, 0.06);
      --card-press-shadow: inset 0 2px 4px rgba(15, 23, 42, 0.12), 0 0 0 rgba(15, 23, 42, 0);

      --selected-chip-scale: 1.32;
      --selected-chip-scale-pop: 1.40;
      --selected-chip-rest-shift-x: calc((1 - var(--selected-chip-scale)) * 50%);

      --name-chip-radius: 999px;
      --name-chip-line-height: 1.2;
      --name-chip-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      --name-chip-font-weight: 400;
      --presence-pop-gutter: 12px;

      /* result card colors — JS がベタ書きの色値を持たないよう CSS 変数で定義 */
      --result-ok-text: #ffffff;
      --result-error-bg: #fef2f2;
      --result-error-border: #fca5a5;
      --result-error-shadow: 0 8px 24px rgba(220, 38, 38, 0.15);
      --result-error-text: #1f2937;
      --result-error-sub: #4b5563;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body,
    button,
    a,
    .presenceMemberChip,
    .sizeBtn,
    .presenceSizeBtn {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    input,
    textarea,
    select,
    [contenteditable="true"] {
      -webkit-user-select: auto;
      user-select: auto;
    }

    .errorText,
    .resultSub,
    #generatedUrlLink {
      -webkit-user-select: text;
      user-select: text;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.4);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(107, 114, 128, 0.6);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "LINE Seed JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body { overflow: hidden; }

    button, input {
      font-family: inherit;
    }

    button, a, .presenceMemberChip {
      touch-action: manipulation;
    }

    .ja-text { font-size: 1em; }
    .en-text {
      font-size: 0.85em;
      opacity: 0.90;
    }

    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 1em;
      line-height: 1;
      display: inline-block;
      white-space: nowrap;
      direction: ltr;
      letter-spacing: normal;
      text-transform: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-feature-settings: 'liga';
    }

    .locationLabelInline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      max-width: 100%;
      min-width: 0;
    }

    .locationLabelInline--presence {
      justify-content: flex-start;
    }

    .locationIcon {
      flex: 0 0 auto;
      color: currentColor;
      line-height: 1;
      margin-right: 0.16em;
    }

    .container {
      width: 100vw;
      height: 100vh;
      padding: env(safe-area-inset-top, 16px)
               env(safe-area-inset-right, 16px)
               env(safe-area-inset-bottom, 16px)
               env(safe-area-inset-left, 16px);
    }

    .appPanel {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .mainArea {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(280px, 1fr);
      gap: 16px;
      min-height: 0;
      overflow: hidden;
      flex: 1;
    }

    .leftArea {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--card-rest-shadow);
      border: 1px solid var(--line);
      padding: 16px;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .presencePanel {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--card-rest-shadow);
      border: 1px solid var(--line);
      padding: 16px;
      min-height: 0;
      max-height: 100%;
      overflow: hidden;
      align-self: stretch;
      display: flex;
      flex-direction: column;
    }

    .leftHeader,
    .presenceHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
      gap: 8px;
      flex: 0 0 auto;
    }

    .title,
    .presenceTitle {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin: 0;
      text-align: left;
      line-height: 1.25;
      flex: 1;
      min-width: 0;
    }

    .titleWrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .headerRightControls,
    .presenceSizeControls {
      display: flex;
      gap: 4px;
      flex: 0 0 auto;
      align-items: center;
    }

    .buttonSizeControls {
      display: flex;
      gap: 4px;
    }

    .selectedUserChipContainer {
      display: flex;
      align-items: center;
      max-width: 100%;
      overflow: visible;
    }

    .nameChip {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-width: 0;
      border-radius: var(--name-chip-radius);
      line-height: var(--name-chip-line-height);
      color: #ffffff;
      box-shadow: var(--name-chip-shadow);
      border: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transform-origin: center center;
      font-weight: var(--name-chip-font-weight);
      will-change: transform, opacity;
    }

    .nameChip--presence {
      padding: 1px 5px;
      font-size: var(--presence-members-size);
    }

    .nameChip--selected {
      transform: translateX(var(--selected-chip-rest-shift-x)) scale(var(--selected-chip-scale));
      padding: 3px 10px;
      font-size: 19px;
    }

    .nameChip--saving {
      padding: 5px 16px;
      font-size: 42px;
      line-height: 1.12;
    }

    .sizeBtn,
    .presenceSizeBtn {
      appearance: none;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: #64748b;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      width: 28px;
      height: 28px;
      padding: 0;
      font-size: 16px;
      line-height: 1;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .sizeBtn:hover,
    .presenceSizeBtn:hover {
      background: #f1f5f9;
      color: #334155;
      border-color: #cbd5e1;
    }

    .sizeBtn:active,
    .presenceSizeBtn:active {
      transform: scale(0.95);
    }

    .sizeBtn:disabled,
    .presenceSizeBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .leftBody {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .buttonGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(var(--button-min-col-width), 1fr));
      gap: 8px;
      align-content: start;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
      padding-bottom: calc(var(--press-depth) + 6px);
      width: 100%;
    }

    #presenceList {
      min-height: 0;
      overflow: auto;
      margin-left: calc(-1 * var(--presence-pop-gutter));
      padding-left: var(--presence-pop-gutter);
      padding-right: 4px;
    }

    .presenceGroup {
      padding: 4px 0;
      margin-bottom: 2px;
      border-radius: 10px;
    }

    .presenceGroup:first-of-type {
      padding-top: 0;
    }

    .presenceGroup.is-recently-updated {
      animation: presenceGroupHighlight var(--presence-highlight-duration, 580ms) ease-out both;
    }

    @keyframes presenceGroupHighlight {
      0% { background: transparent; }
      18%, 100% { background: var(--presence-highlight-bg, rgba(75, 85, 99, 0.12)); }
    }

    .presenceLocation {
      display: flex;
      align-items: center;
      font-size: var(--presence-location-size);
      font-weight: 400;
      margin-bottom: 4px;
      line-height: 1.25;
      color: var(--text);
    }

    .loc-name {
      flex: 1;
      min-width: 0;
    }

    .presenceLocation .loc-name {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      min-width: 0;
    }

    .presenceLocation .locationLabelInline--presence {
      display: inline-flex;
      align-items: center;
      flex-wrap: nowrap;
      min-width: 0;
    }

    .presenceLocation .locationLabelInline--presence .ja-text,
    .presenceLocation .locationLabelInline--presence .en-text {
      display: inline-block;
      line-height: 1.1;
    }

    .loc-count {
      background: #f1f5f9;
      color: #64748b;
      font-size: 12px;
      font-weight: 500;
      padding: 1px 7px;
      border-radius: 10px;
      margin-left: 6px;
    }

    .presenceMembers {
      font-size: var(--presence-members-size);
      display: flex;
      flex-wrap: wrap;
      gap: 3px 4px;
      padding-left: 0;
      margin-top: 0;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: scale(0.94); }
      100% { opacity: 1; transform: scale(1); }
    }

    .btn {
      border: none;
      border-radius: 20px;
      padding: var(--button-padding-y) var(--button-padding-x);
      background: var(--accent);
      color: white;
      font-weight: 400;
      cursor: pointer;
      line-height: 1.25;
      transition:
        transform 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        box-shadow 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        filter 0.18s ease,
        background 0.15s ease;
      min-height: var(--button-min-height);
      font-size: var(--button-font-size);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.12), 0 1px 3px rgba(15, 23, 42, 0.08);
      max-width: 100%;
      overflow: hidden;
      touch-action: manipulation;
      position: relative;
    }

    .btn.is-current-location::before {
      content: "";
      position: absolute;
      top: 9px;
      left: 9px;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #ffffff;
      opacity: 0.90;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.18);
      pointer-events: none;
    }

    .btn.is-pressed,
    .btn:active {
      transition: none;
      transform: translateY(var(--press-depth)) scale(0.982);
      box-shadow: var(--card-press-shadow);
      filter: brightness(0.95) saturate(0.97);
    }

    .btn .btn-main-line,
    .btn .btn-sub-line {
      transition: transform 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn.is-pressed .btn-main-line,
    .btn.is-pressed .btn-sub-line,
    .btn:active .btn-main-line,
    .btn:active .btn-sub-line {
      transform: translateY(1px);
    }

    .btn:disabled,
    .buttonGrid.is-busy .btn {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .buttonGrid.is-busy {
      pointer-events: none;
    }

    .btn.secondary,
    .nameChip.secondary,
    .presenceMemberChip.secondary {
      background: #f1f5f9;
      color: var(--text);
    }

    .btn.secondary {
      border: 1px solid #dbe3ee;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    .btn-main-line {
      display: block;
      width: 100%;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .btn-sub-line {
      display: block;
      width: 100%;
      line-height: 1.2;
      margin-top: 4px;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .hidden { display: none !important; }

    .resultView {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 0;
      padding-top: 24px;
      overflow: auto;
      animation: fadeUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .resultCard {
      width: min(760px, 92%);
      text-align: center;
      border-radius: 28px;
      padding: 32px 20px;
      background: #f8fafc;
      border: 1px solid var(--line);
      box-shadow: 0 18px 34px rgba(15, 23, 42, 0.10), 0 6px 12px rgba(15, 23, 42, 0.06);
    }

    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .resultStatus {
      font-size: 20px;
      font-weight: 400;
      line-height: 1.35;
      margin-bottom: 20px;
      color: var(--sub);
    }

    .resultStatus.error { color: var(--danger); }

    .resultName {
      font-size: 42px;
      font-weight: 400;
      line-height: 1.2;
      margin: 0 0 20px;
    }

    .resultLocation {
      font-size: 42px;
      font-weight: 400;
      line-height: 1.2;
      margin: 0;
    }

    .resultSub {
      font-size: 18px;
      color: var(--sub);
      line-height: 1.45;
      margin-top: 14px;
      white-space: pre-line;
    }

    .resultSub.resultSub--danger {
      color: var(--danger);
    }

    .resultActions {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .resultActionBtn {
      min-width: 180px;
      min-height: 60px;
      font-size: 22px;
      padding: 12px 20px;
    }

    .savingPresenceView {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 0;
      padding: 0 12px 16px;
      overflow: auto;
    }

    .savingPresenceGroup {
      width: max-content;
      max-width: min(96%, 1120px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      margin-inline: auto;
      transform-origin: center top;
      will-change: transform, opacity;
    }

    .savingPresenceLocation {
      display: flex;
      align-items: center;
      width: max-content;
      max-width: 100%;
      min-width: 0;
      margin-bottom: 16px;
      font-size: 42px;
      line-height: 1.12;
      color: var(--text);
      opacity: 1;
      transform: translateY(0);
      transition: opacity 260ms ease, transform 400ms cubic-bezier(0.22, 0.8, 0.2, 1);
    }

    .savingPresenceLocation.is-pending {
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
    }

    .savingPresenceLocation .loc-name {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .savingPresenceMembers {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      gap: 0;
      width: max-content;
      max-width: 100%;
      min-width: 0;
      padding-left: 0;
    }

    .syncIndicator {
      --sync-color: var(--sub);
      z-index: 30;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-width: 62px;
      margin-top: 28px;
      padding: 9px 12px;
      border-radius: 999px;
      color: var(--sync-color);
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(226, 232, 240, 0.86);
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      pointer-events: none;
      backdrop-filter: blur(8px);
    }

    .syncIndicator--side {
      color: var(--sync-color);
    }

    .syncIndicator__dots {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .syncIndicator__dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.34;
      animation: syncDotPulse 920ms ease-in-out infinite;
    }

    .syncIndicator__dot:nth-child(2) { animation-delay: 120ms; }
    .syncIndicator__dot:nth-child(3) { animation-delay: 240ms; }

    .syncIndicator__trail {
      position: relative;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.58;
      transform: translateX(1px);
    }

    .syncIndicator__trail::after {
      content: "";
      position: absolute;
      right: -1px;
      top: 50%;
      width: 5px;
      height: 5px;
      border-top: 2px solid currentColor;
      border-right: 2px solid currentColor;
      transform: translateY(-50%) rotate(45deg);
    }

    .syncIndicator__check {
      display: none;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.40);
    }

    .syncIndicator__check::before {
      content: "";
      width: 16px;
      height: 10px;
      border-left: 4px solid currentColor;
      border-bottom: 4px solid currentColor;
      transform: translateY(-2px) rotate(-45deg);
    }

    .syncIndicator--done {
      min-width: 0;
      margin-top: 18px;
      padding: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      backdrop-filter: none;
      animation: popIn 220ms cubic-bezier(0.2, 0.9, 0.2, 1.12);
    }

    .syncIndicator--done .syncIndicator__dots,
    .syncIndicator--done .syncIndicator__trail {
      display: none;
    }

    .syncIndicator--done .syncIndicator__check {
      display: inline-flex;
    }

    @keyframes syncDotPulse {
      0%, 100% { opacity: 0.30; transform: translateX(0) scale(0.92); }
      50% { opacity: 0.82; transform: translateX(2px) scale(1); }
    }

    .errorWrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 20px 20px;
      overflow: auto;
    }

    .errorBox {
      width: min(760px, 100%);
      margin-inline: auto;
      text-align: center;
      background: var(--panel);
      padding: 30px;
      border-radius: 28px;
      border: 1px solid var(--line);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05), 0 1px 3px rgba(15, 23, 42, 0.04);
    }

    .errorTitle {
      font-size: 30px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 16px;
      color: var(--text);
    }

    .errorText {
      font-size: 18px;
      line-height: 1.7;
      color: var(--sub);
      word-break: break-word;
    }

    /* Setup page styles */
    .setupStep {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .setupStep > * {
      max-width: 100%;
    }

    .setupInputWrap {
      margin-top: 20px;
    }

    .setupInput {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      font-size: 20px;
      border: 2px solid var(--line);
      border-radius: 16px;
      text-align: center;
      outline: none;
      font-family: inherit;
    }

    .setupGenerateWrap {
      margin-top: 24px;
    }

    .setupGenerateBtn {
      min-height: 60px;
      font-size: 20px;
      padding: 0 40px;
      margin: 0 auto;
    }

    .setupReadyMessage {
      color: var(--ok);
      font-size: 24px;
      margin-bottom: 12px;
    }

    .setupInstructions {
      margin-bottom: 24px;
    }

    .setupInstructions .highlight {
      color: var(--danger);
    }

    .setupUrlLink {
      display: block;
      background: #eff6ff;
      padding: 16px;
      border-radius: 16px;
      border: 2px dashed var(--accent2);
      word-break: break-all;
      font-size: 18px;
      color: var(--accent2);
      margin-bottom: 24px;
      text-decoration: underline;
    }

    .setupQrLabel {
      font-size: 14px;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .setupQrImage {
      width: 160px;
      height: 160px;
      margin-bottom: 10px;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 6px;
      background: var(--panel);
    }

    .setupQrNote {
      font-size: 12px;
      color: var(--sub);
      line-height: 1.5;
    }

    .flyingCardGhost {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 9999;
      pointer-events: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 10px;

  <script>
    // AudioContext の初期化: pointerdown を使い、タッチ・マウス両方に対応

    const INITIAL_TERMINAL_NAME = <?!= initialTerminalNameRaw || 'null' ?>;

    const CHIP_ANIMATION = {
      flight: {

        endOpacity: 0.28

        peakOffset: 0.50
      },
      timing: {

      }
    };

    const SAVE_TIMEOUT_MS = 15000;
    const SAVING_LOCATION_REVEAL_AFTER_START_MS = 0;
    const PRESENCE_FONT_LEVEL_KEY = 'presenceFontLevel';

    const BUTTON_SIZE_LEVEL_KEY = 'buttonSizeLevel';
    const BUTTON_SIZE_MIN = 1;
    const BUTTON_SIZE_MAX = 5;
    const BUTTON_SIZE_DEFAULT = 3;

    const PRESENCE_FONT_SIZE_MAP = {
      1: { location: 15, members: 13 },
      2: { location: 17, members: 15 },
      3: { location: 19, members: 17 },
      4: { location: 21, members: 19 },

    const BUTTON_SIZE_MAP = {
      1: { font: 18, minHeight: 54, py: 6, px: 6, minCol: 90 },
      2: { font: 20, minHeight: 60, py: 8, px: 8, minCol: 105 },
      3: { font: 22, minHeight: 66, py: 10, px: 8, minCol: 120 },
      4: { font: 24, minHeight: 74, py: 12, px: 10, minCol: 140 },
      5: { font: 26, minHeight: 82, py: 14, px: 12, minCol: 160 }
    };

    // escapeHtml で毎回オブジェクト生成しないよう外部定数化
    const HTML_ESCAPE_MAP = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };

    let appData = {
      users: [],
      locations: [],
      terminalName: INITIAL_TERMINAL_NAME || '',
      presence: []
    };

    let selectedUser = null;
    let resetTimer = null;
    let presencePollTimer = null;
    let lastPresenceJson = '';
    let isPresenceFetchRunning = false;
    let presenceFetchVersion = 0;

    let syncQueue = [];
    let isQueueProcessing = false;
    let isQueuePaused = false;
    let isUiLocked = false;

    let tapAudioCtx = null;
    let presenceFontLevel = PRESENCE_FONT_DEFAULT;
    let buttonSizeLevel = BUTTON_SIZE_DEFAULT;
    let lastSelectedUserButtonRect = null;
    let lastSelectedUserButtonBackground = '';
    let savingPresenceLocationTimer = null;
    let saveWatchdogTimer = null;

    let activeSaveRequestId = null;

    // presence 更新時のみ再計算するカラーマップキャッシュ
    let cachedUserLocationColorMap = null;

    function initDOM() {
      els.title                    = document.getElementById('title');
      els.leftArea                 = document.querySelector('.leftArea');
      els.buttonSizeControls       = document.getElementById('buttonSizeControls');
      els.selectedUserChipContainer= document.getElementById('selectedUserChipContainer');

      els.buttonGrid               = document.getElementById('buttonGrid');

      els.savingPresenceView       = document.getElementById('savingPresenceView');
      els.savingPresenceGroup      = document.getElementById('savingPresenceGroup');
      els.savingPresenceLocation   = document.getElementById('savingPresenceLocation');
      els.savingPresenceLocationName = document.getElementById('savingPresenceLocationName');
      els.savingPresenceChip       = document.getElementById('savingPresenceChip');
      els.syncIndicator            = document.getElementById('syncIndicator');
      syncIndicatorHome            = els.syncIndicator ? els.syncIndicator.parentElement : null;
      els.resultCard               = document.getElementById('resultCard');
      els.presencePanel            = document.querySelector('.presencePanel');
      els.presenceList             = document.getElementById('presenceList');
      els.resultStatus             = document.getElementById('resultStatus');
      els.resultName               = document.getElementById('resultName');
      els.resultLocation           = document.getElementById('resultLocation');
      els.resultSub                = document.getElementById('resultSub');
      els.resultActions            = document.getElementById('resultActions');
      els.resultOkBtn              = document.getElementById('resultOkBtn');
      els.presenceFontMinus        = document.getElementById('presenceFontMinus');
      els.presenceFontPlus         = document.getElementById('presenceFontPlus');
      els.buttonSizeMinus          = document.getElementById('buttonSizeMinus');
      els.buttonSizePlus           = document.getElementById('buttonSizePlus');
    }

    function clearResetTimer() {
      if (!resetTimer) return;
      clearTimeout(resetTimer);
      resetTimer = null;
    }

    function clearSaveWatchdogTimer() {
      if (!saveWatchdogTimer) return;
      clearTimeout(saveWatchdogTimer);
      saveWatchdogTimer = null;
    }

    function clearActiveSaveRequest() {
      clearSaveWatchdogTimer();
      activeSaveRequestId = null;
    }

    function handleSaveTimeout(task, requestId) {
      if (requestId !== activeSaveRequestId) return;

      clearActiveSaveRequest();
      isQueueProcessing = false;
      syncQueue.shift();
      isQueuePaused = true;
      isUiLocked = true;
      if (task) task.cancelPresenceScroll = true;

      clearResetTimer();

      playSaveErrorSound();
      setHeader('通信に時間がかかっています', 'Request Taking Too Long');
      setSelectedUserChipHidden(true);
      showResultView({
        ok: false,
        statusError: '通信が長引いています<br>Request is taking too long',
        nameJa: task.nameJa,
        nameEn: task.nameEn,
        locationJa: task.locationJa,
        locationEn: task.locationEn,
        subJa: '保存処理の応答が規定時間以内に返りませんでした。［戻る］を押して画面を戻してください。\n\nサーバー側では保存が完了している可能性もあるため、右欄の表示も確認してください。',
        subEn: 'No response was received within the expected time. Press [Back] to return.\n\nThe save may still have completed on the server, so also check the status panel on the right.',
        inline: true
      });
      scrollLeftPanelForError();

      startPresencePolling();
      fetchPresenceNow();

      showResultActionButton(() => {
        isQueuePaused = false;
        isUiLocked = false;
        renderUserSelection();
        processQueue();
      });
    }

    function setSelectedUserChipHidden(isHidden) {
      if (!els.selectedUserChipContainer) return;
      els.selectedUserChipContainer.classList.toggle('hidden', !!isHidden);
    }

    // load 時に1回だけ呼ばれるため、二重バインド防止フラグは不要
    function bindStaticPressFeedback() {
      [
        els.resultOkBtn,
        els.presenceFontMinus,
        els.presenceFontPlus,
        els.buttonSizeMinus,
        els.buttonSizePlus
      ].forEach(attachPressFeedback);
    }

    function bindStaticControlEvents() {
      if (els.presenceFontMinus) {
        els.presenceFontMinus.addEventListener('click', () => {
          playTapSound();
          changePresenceFontLevel(-1);
        });
      }
      if (els.presenceFontPlus) {
        els.presenceFontPlus.addEventListener('click', () => {
          playTapSound();
          changePresenceFontLevel(1);
        });
      }
      if (els.buttonSizeMinus) {
        els.buttonSizeMinus.addEventListener('click', () => {
          playTapSound();
          changeButtonSizeLevel(-1);
        });
      }
      if (els.buttonSizePlus) {
        els.buttonSizePlus.addEventListener('click', () => {
          playTapSound();
          changeButtonSizeLevel(1);
        });
      }
    }

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, ch => HTML_ESCAPE_MAP[ch]);
    }

    function formatBilingualLines(ja, en) {
      const parts = [];
      if (ja) parts.push(`<span class="ja-text">${escapeHtml(ja)}</span>`);
      if (en) parts.push(`<span class="en-text">${escapeHtml(en)}</span>`);
      return parts.join('<br>');
    }

    function formatBilingualInline(ja, en) {
      if (ja && en) {
        return `<span class="ja-text">${escapeHtml(ja)}</span><span class="en-text">/${escapeHtml(en)}</span>`;
      }
      if (ja) return `<span class="ja-text">${escapeHtml(ja)}</span>`;
      if (en) return `<span class="en-text">${escapeHtml(en)}</span>`;
      return '';
    }

    function normalizeMaterialSymbolName(iconName) {
      const normalized = String(iconName || '').trim().toLowerCase().replace(/[\s-]+/g, '_');
      return /^[a-z0-9_]+$/.test(normalized) ? normalized : '';
    }

    // colorStyle を引数で受け取り、replace() ハックを排除
    function renderLocationIconHtml(iconName, variantClass, colorStyle) {
      const safeName = normalizeMaterialSymbolName(iconName);
      if (!safeName) return '';

      const styleAttr = colorStyle ? ` style="color: ${escapeHtml(colorStyle)};"` : '';
      return `<span class="material-symbols-outlined locationIcon ${variantClass || ''}" aria-hidden="true"${styleAttr}>${safeName}</span>`;
    }

    function renderLocationButtonMainLineHtml(location) {
      return escapeHtml(location && location.ja || '');
    }

    function renderSavingLocationHtml(location) {
      const locationJa = escapeHtml(location && location.ja || '');
      const locationEn = escapeHtml(location && location.en || '');
      const iconColor  = normalizeHexColor(location && location.color) || getDefaultAccentColor();
      const iconHtml   = renderLocationIconHtml(location && location.icon, 'locationIcon--presence', iconColor);

      return `<span class="locationLabelInline locationLabelInline--saving">${iconHtml}<span class="ja-text">${locationJa}</span><span class="en-text">/${locationEn}</span></span>`;
    }

    function renderPresenceLocationHtml(locationJa, locationEn, iconName, iconColor) {
      const safeJa = escapeHtml(locationJa);
      const safeEn = escapeHtml(locationEn);
      const iconHtml = renderLocationIconHtml(iconName, 'locationIcon--presence', iconColor || null);

      return `<span class="locationLabelInline locationLabelInline--presence">${iconHtml}<span class="ja-text">${safeJa}</span><span class="en-text">/${safeEn}</span></span>`;
    }

    function extractErrorText(err) {
      const raw = String((err && err.message) || (err && err.details) || err || '').trim();

      const isLockConflict =
        raw.includes('This action was not saved because another save was in progress') ||
        raw.includes('ほかの保存処理と重なったため、今回は保存されませんでした') ||
        raw.includes('A save operation was still in progress') ||
        raw.includes('保存処理が進行中のため');

      if (!raw) {
        return { ja: '不明なエラーが発生しました', en: 'An unknown error occurred', reason: 'unknown' };
      }

      return {
        ja: `エラー\n${raw}`,
        en: `Error\n${raw}`,
        reason: isLockConflict ? 'lock' : 'other'
      };
    }

    function clamp(num, min, max) {
      return Math.min(max, Math.max(min, num));
    }

    function normalizeHexColor(color) {
      const s = String(color || '').trim();
      if (!/^#[0-9a-f]{3}([0-9a-f]{3})?$/i.test(s)) return '';
      return s.length === 4
        ? '#' + s.slice(1).split('').map(ch => ch + ch).join('')
        : s;
    }

    function adjustHexColor(color, amount) {
      const hex = normalizeHexColor(color);
      if (!hex) return '';

      const r = clamp(parseInt(hex.slice(1, 3), 16) + amount, 0, 255);
      const g = clamp(parseInt(hex.slice(3, 5), 16) + amount, 0, 255);
      const b = clamp(parseInt(hex.slice(5, 7), 16) + amount, 0, 255);

      return '#' + [r, g, b].map(n => n.toString(16).padStart(2, '0')).join('');
    }

    function hexToRgba(color, alpha) {
      const hex = normalizeHexColor(color);
      if (!hex) return '';

      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);

      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // フォールバック色を CSS の --accent (#4b5563) と一致させる
    function getDefaultAccentColor() {
      return normalizeHexColor(
        getComputedStyle(document.documentElement).getPropertyValue('--accent')
      ) || '#4b5563';
    }

    function invalidateUserLocationColorCache() {
      cachedUserLocationColorMap = null;
    }

    // presence 更新時のみ再計算し、それ以外はキャッシュを返す
    function getUserLocationColorMap() {
      if (cachedUserLocationColorMap) return cachedUserLocationColorMap;

      const colorMap = new Map(
        (appData.locations || []).map(l => [l.id, normalizeHexColor(l.color)])
      );

      const map = new Map();
      (appData.presence || []).forEach(group => {
        const locationColor = colorMap.get(group.locationId) || '';
        (group.members || []).forEach(member => {
          if (member && member.username) {
            map.set(member.username, locationColor);
          }
        });
      });

      cachedUserLocationColorMap = map;
      return map;
    }

    function getUserLocationId(username) {
      if (!username) return '';

      for (const group of (appData.presence || [])) {
        const members = group && group.members || [];
        if (members.some(member => member && member.username === username)) {
          return group.locationId || '';
        }
      }

      return '';
    }

    function getPresenceSignature(presence) {
      return JSON.stringify((presence || []).map(group => ({
        locationId: group && group.locationId || '',
        locationJa: group && group.locationJa || '',
        locationEn: group && group.locationEn || '',
        members: (group && group.members || []).map(member => ({
          username: member && member.username || '',
          nameJa:   member && member.nameJa   || '',
          nameEn:   member && member.nameEn   || ''
        }))
      })));

    function refreshUserButtonsIfNeeded() {

    function playTapSound() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;

        if (!tapAudioCtx) {
          tapAudioCtx = new AudioContextClass();
        }

        if (tapAudioCtx.state === 'suspended') {
          tapAudioCtx.resume();
        }

        const osc  = tapAudioCtx.createOscillator();
        const gain = tapAudioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.value = 880;

        gain.gain.setValueAtTime(0.0001, tapAudioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.8,    tapAudioCtx.currentTime + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.0001, tapAudioCtx.currentTime + 0.05);

        osc.connect(gain);
        gain.connect(tapAudioCtx.destination);

        osc.start();
        osc.stop(tapAudioCtx.currentTime + 0.05);
      } catch (_) {}
    }

    function playToneSequence(notes, volume = 0.22) {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;

        if (!tapAudioCtx) {
          tapAudioCtx = new AudioContextClass();
        }

        if (tapAudioCtx.state === 'suspended') {
          tapAudioCtx.resume();
        }

        let startAt = tapAudioCtx.currentTime;

        notes.forEach(note => {
          const duration = note.duration || 0.12;
          const osc = tapAudioCtx.createOscillator();
          const gain = tapAudioCtx.createGain();

          osc.type = note.type || 'sine';
          osc.frequency.setValueAtTime(note.frequency, startAt);

          gain.gain.setValueAtTime(0.0001, startAt);
          gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.012);
          gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);

          osc.connect(gain);
          gain.connect(tapAudioCtx.destination);

          osc.start(startAt);
          osc.stop(startAt + duration + 0.01);

          startAt += duration + (note.gap || 0);
        });
      } catch (_) {}
    }
