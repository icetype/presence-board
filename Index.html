    function waitForScrollSettle(targetEl, timeoutMs = 900) {
      if (!targetEl || !window.requestAnimationFrame) {
        return new Promise(resolve => window.setTimeout(resolve, 250));
      }

      return new Promise(resolve => {
        const start = performance.now();
        let lastTop = null;
        let stableFrames = 0;

        const tick = now => {
          const rect = targetEl.getBoundingClientRect();
          const top = rect ? rect.top : 0;

          if (lastTop != null && Math.abs(top - lastTop) < 0.5) {
            stableFrames += 1;
          } else {
            stableFrames = 0;
          }

          lastTop = top;

          if (stableFrames >= 4 || now - start >= timeoutMs) {
            resolve();
            return;
          }

          requestAnimationFrame(tick);
        };

        requestAnimationFrame(tick);
      });
    }

    function getPresenceScrollMargin(targetEl) {
      const locationEl = targetEl.querySelector ? targetEl.querySelector('.presenceLocation') : null;
      const lineStyle = locationEl ? window.getComputedStyle(locationEl) : null;
      const fontSize = lineStyle ? parseFloat(lineStyle.fontSize) : 19;
      const lineHeight = lineStyle && lineStyle.lineHeight !== 'normal'
        ? parseFloat(lineStyle.lineHeight)
        : fontSize * 1.25;

      return Number.isFinite(lineHeight) ? lineHeight : 24;
    }

    function scrollElementBottomIntoView(targetEl, margin, alsoKeepEl = null, alsoMargin = 0) {
      const rect = targetEl.getBoundingClientRect();
      const alsoRect = alsoKeepEl ? alsoKeepEl.getBoundingClientRect() : null;
      const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
      const bottomLimit = Math.max(0, viewportHeight - margin);
      const targetScroll = Math.max(0, rect.bottom - bottomLimit);
      const alsoBottomLimit = Math.max(0, viewportHeight - alsoMargin);
      const alsoScroll = alsoRect ? Math.max(0, alsoRect.bottom - alsoBottomLimit) : 0;
      const targetTopLimit = Math.max(targetScroll, rect.top);
      const optionalScroll = alsoScroll > targetScroll
        ? Math.min(alsoScroll, targetTopLimit)
        : alsoScroll;
      const nextTop = window.scrollY + Math.max(targetScroll, optionalScroll);

      if (Math.abs(nextTop - window.scrollY) < 1) {
        return Promise.resolve();
      }

      try {
        window.scrollTo({ top: Math.max(0, nextTop), behavior: 'smooth' });
      } catch (_) {
        window.scrollTo(0, Math.max(0, nextTop));
      }

      return waitForScrollSettle(targetEl);
    }

    function scrollPresencePanelForSave(task) {
      if (!isPresencePanelBelowMainFlow() || !els.presencePanel) {
        return Promise.resolve();
      }

      const targetGroup = task && task.locationId && window.CSS && CSS.escape
        ? els.presencePanel.querySelector(`.presenceGroup[data-location-id="${CSS.escape(task.locationId)}"]`)
        : null;
      const targetEl = targetGroup || els.presencePanel;
      const sourceChip = task && task.username ? getPresenceChipElement(task.username) : null;
      const margin = getPresenceScrollMargin(targetEl);

      return scrollElementBottomIntoView(targetEl, margin, sourceChip, margin);
    }

    function highlightPresenceGroup(locationId, color) {
      if (!locationId || !els.presenceList || !window.CSS || !CSS.escape) return;

      const group = els.presenceList.querySelector(`.presenceGroup[data-location-id="${CSS.escape(locationId)}"]`);
      if (!group) return;

      const delayMs = 0;
      const resetMs = CHIP_ANIMATION.flight.durationMs + CHIP_ANIMATION.landing.durationMs + 80;
      const durationMs = Math.max(240, resetMs - delayMs + 40);

      group.style.setProperty('--presence-highlight-bg', hexToRgba(color, 0.12) || 'rgba(75, 85, 99, 0.12)');
      group.style.setProperty('--presence-highlight-duration', `${durationMs}ms`);
      group.classList.remove('is-recently-updated');

      window.setTimeout(() => {
        if (!group.isConnected) return;
        void group.offsetWidth;
        group.classList.add('is-recently-updated');
      }, delayMs);

      window.setTimeout(() => {
        if (!group.isConnected) return;
        group.classList.remove('is-recently-updated');
        group.style.removeProperty('--presence-highlight-bg');
        group.style.removeProperty('--presence-highlight-duration');
      }, resetMs + 40);
    }

    function scrollLeftPanelForError() {
      if (!isPresencePanelBelowMainFlow() || !els.leftArea) return;

      try {
        els.leftArea.scrollIntoView({ behavior: 'smooth', block: 'start', inline: 'nearest' });
      } catch (_) {
        els.leftArea.scrollIntoView();
      }
    }

    function measureNaturalTextWidth(el) {
      if (!el) return 0;

      const probe = document.createElement('span');
      const style = window.getComputedStyle(el);

      probe.textContent = (el.textContent || '').trim();
      probe.style.position    = 'fixed';
      probe.style.left        = '-99999px';
      probe.style.top         = '-99999px';
      probe.style.visibility  = 'hidden';
      probe.style.whiteSpace  = 'nowrap';
      probe.style.display     = 'inline-block';
      // font ショートハンドで fontFamily/fontSize/fontWeight/fontStyle/lineHeight をまとめて設定
      probe.style.font         = style.font;
      probe.style.letterSpacing= style.letterSpacing;
      probe.style.textTransform= style.textTransform;

      document.body.appendChild(probe);
      const width = probe.getBoundingClientRect().width;
      probe.remove();

      return width;
    }
    function getGhostChipMetrics(el) {
      if (!el) return { fontSizePx: 42, paddingY: 5, paddingX: 16 };

      const cs = getComputedStyle(el);
      return {
        fontSizePx: parseFloat(cs.fontSize)  || 42,
        paddingY:   parseFloat(cs.paddingTop) || 5,
        paddingX:   parseFloat(cs.paddingLeft)|| 16
      };
    }

    function stopElementAnimations(el) {
      if (!el) return;
      if (el.getAnimations) {
        el.getAnimations().forEach(anim => anim.cancel());
      }
      el.style.opacity   = '';
      el.style.transform = '';
    }

    function startElementAnimation(el, keyframes, options, onFinish, onCancel) {
      if (!el || !el.animate) return null;

      const anim = el.animate(keyframes, options);

      if (anim.finished && (onFinish || onCancel)) {
        anim.finished.then(onFinish || (() => {}), onCancel || (() => {}));
      }

      return anim;
    }

    function scheduleAnimationStart(fn) {
      requestAnimationFrame(() => {
        requestAnimationFrame(fn);
      });
    }

    function getSelectedChipLandingTransforms() {
      const rootStyle = getComputedStyle(document.documentElement);
      const shiftX    = rootStyle.getPropertyValue('--selected-chip-rest-shift-x').trim() || '0px';
      const restScale = parseFloat(rootStyle.getPropertyValue('--selected-chip-scale'))    || 1;
      const peakScale = parseFloat(rootStyle.getPropertyValue('--selected-chip-scale-pop'))|| restScale;

      return {
        startTransform: `translateX(${shiftX}) scale(${restScale * CHIP_ANIMATION.landing.startScaleFactor})`,
        peakTransform:  `translateX(${shiftX}) scale(${peakScale})`,
        endTransform:   `translateX(${shiftX}) scale(${restScale})`
      };
    }

    function getChipLandingTransforms(el) {
      if (el === els.selectedUserChip) {
        return getSelectedChipLandingTransforms();
      }
      if (el === els.savingPresenceChip) {
        return {
          startTransform: 'scale(1)',
          peakTransform:  'scale(1)',
          endTransform:   'scale(1)'
        };
      }

      return {
        startTransform: `scale(${CHIP_ANIMATION.landing.startScaleFactor})`,
        peakTransform:  `scale(${CHIP_ANIMATION.landing.peakScale})`,
        endTransform:   'scale(1)'
      };
    }

    function getLandingDelayMs(flightDurationMs) {
      return Math.max(0, flightDurationMs - CHIP_ANIMATION.timing.overlapMs);
    }

    function playGhostFlight(fromRect, toRect, options = {}) {
      if (!fromRect || !toRect) return null;

      const ghost = document.createElement('div');
      ghost.className = 'flyingCardGhost';
      ghost.innerHTML = options.html || '';
      const startBackground = options.startBackground || options.background || getDefaultAccentColor();
      const endBackground   = options.endBackground || startBackground;
      ghost.style.background = startBackground;

      if (options.fontSizePx) ghost.style.fontSize  = `${options.fontSizePx}px`;
      if (options.fontWeight) ghost.style.fontWeight = String(options.fontWeight);
      if (options.paddingY != null || options.paddingX != null) {
        const py = options.paddingY != null ? options.paddingY : 4;
        const px = options.paddingX != null ? options.paddingX : 10;
        ghost.style.padding = `${py}px ${px}px`;
      }

      // 初期測定のために非表示で配置
      ghost.style.visibility = 'hidden';
      document.body.appendChild(ghost);

      const ghostRect  = ghost.getBoundingClientRect();
      const baseWidth  = options.baseWidth  || ghostRect.width;
      const baseHeight = options.baseHeight || ghostRect.height;

      if (!Number.isFinite(baseWidth) || !baseWidth || !Number.isFinite(baseHeight) || !baseHeight) {
        ghost.remove();
        return null;
      }

      const startScaleX = Number.isFinite(options.startScaleX)
        ? options.startScaleX
        : (Number.isFinite(options.startScale) ? options.startScale : 1);
      const startScaleY = Number.isFinite(options.startScaleY)
        ? options.startScaleY
        : (Number.isFinite(options.startScale) ? options.startScale : 1);
      const endScaleX = Number.isFinite(options.endScaleX)
        ? options.endScaleX
        : (Number.isFinite(options.endScale) ? options.endScale : 1);
      const endScaleY = Number.isFinite(options.endScaleY)
        ? options.endScaleY
        : (Number.isFinite(options.endScale) ? options.endScale : 1);

      const durationMs   = Number.isFinite(options.durationMs)   ? options.durationMs   : CHIP_ANIMATION.flight.durationMs;
      const easing       = options.easing       || CHIP_ANIMATION.flight.easing;
      const startOpacity = Number.isFinite(options.startOpacity) ? options.startOpacity : CHIP_ANIMATION.flight.startOpacity;
      const endOpacity   = Number.isFinite(options.endOpacity)   ? options.endOpacity   : CHIP_ANIMATION.flight.endOpacity;
      const peakOpacity  = Number.isFinite(options.peakOpacity)  ? options.peakOpacity  : null;
      const peakOffset   = Number.isFinite(options.peakOpacityOffset)
        ? clamp(options.peakOpacityOffset, 0, 1)
        : 0.25;

      const startX = fromRect.left + fromRect.width  / 2 - baseWidth  / 2;
      const startY = fromRect.top  + fromRect.height / 2 - baseHeight / 2;
      const endX   = toRect.left   + toRect.width    / 2 - baseWidth  / 2;
      const endY   = toRect.top    + toRect.height   / 2 - baseHeight / 2;

      const startTransform = `translate(${startX}px, ${startY}px) scale(${startScaleX}, ${startScaleY})`;
      const endTransform   = `translate(${endX}px,   ${endY}px)   scale(${endScaleX},   ${endScaleY})`;

      ghost.style.width     = `${baseWidth}px`;
      ghost.style.height    = `${baseHeight}px`;
      ghost.style.transform = startTransform;
      ghost.style.opacity   = String(startOpacity);
      ghost.style.visibility= 'visible';

      const keyframes = startBackground !== endBackground
        ? [
            { transform: startTransform, opacity: startOpacity, background: startBackground, offset: 0 },
            { background: startBackground, offset: 0.20 },
            ...(peakOpacity != null ? [{ opacity: peakOpacity, offset: peakOffset }] : []),
            { background: endBackground,   offset: 0.80 },
            { transform: endTransform, opacity: endOpacity, background: endBackground, offset: 1 }
          ]
        : [
            { transform: startTransform, opacity: startOpacity, background: startBackground },
            ...(peakOpacity != null ? [{ opacity: peakOpacity, offset: peakOffset }] : []),
            { transform: endTransform,   opacity: endOpacity,   background: endBackground }
          ];

      const anim = startElementAnimation(
        ghost,
        keyframes,
        { duration: durationMs, easing, fill: 'forwards' },
        () => ghost.remove(),
        () => ghost.remove()
      );

      if (!anim) {
        ghost.remove();
        return null;
      }

      return anim;
    }

    function playChipLanding(targetEl, delayMs = 0) {
      if (!targetEl) return null;

      stopElementAnimations(targetEl);

      const { startTransform, peakTransform, endTransform } = getChipLandingTransforms(targetEl);

      const anim = startElementAnimation(
        targetEl,
        [
          { transform: startTransform, opacity: 0, offset: 0 },
          { transform: peakTransform,  opacity: 1, offset: CHIP_ANIMATION.landing.peakOffset },
          { transform: endTransform,   opacity: 1, offset: 1 }
        ],
        {
          duration: CHIP_ANIMATION.landing.durationMs,
          delay:    Math.max(0, delayMs),
          easing:   CHIP_ANIMATION.landing.easing,
          fill:     'both'
        },
        () => {
          targetEl.style.opacity   = '1';
          targetEl.style.transform = endTransform;
        }
      );

      if (!anim) {
        stopElementAnimations(targetEl);
        return null;
      }

      return anim;
    }

    function areRectsNearlySame(a, b) {
      if (!a || !b) return false;

      const centerAX = a.left + a.width / 2;
      const centerAY = a.top  + a.height / 2;
      const centerBX = b.left + b.width / 2;
      const centerBY = b.top  + b.height / 2;

      return Math.abs(centerAX - centerBX) < 4 &&
             Math.abs(centerAY - centerBY) < 4 &&
             Math.abs(a.width  - b.width)  < 4 &&
             Math.abs(a.height - b.height) < 4;
    }

    function playChipSamePlaceBounce(targetEl) {
      if (!targetEl) return null;

      stopElementAnimations(targetEl);

      const anim = startElementAnimation(
        targetEl,
        [
          { transform: 'translate(0, 0)' },
          { transform: 'translate(-2px, -9px)', offset: 0.22 },
          { transform: 'translate(2px, 4px)', offset: 0.45 },
          { transform: 'translate(-1px, -5px)', offset: 0.66 },
          { transform: 'translate(1px, 2px)', offset: 0.84 },
          { transform: 'translate(0, 0)' }
        ],
        {
          duration: 620,
          easing:   'cubic-bezier(0.2, 0.8, 0.2, 1)',
          fill:     'both'
        },
        () => {
          targetEl.style.transform = '';
        },
        () => {
          targetEl.style.transform = '';
        }
      );

      return anim;
    }

    function launchGhostWithLandingPop({
      fromRect,
      toRect,
      ghostOptions = {},
      targetEl = null,
      sourceEl = null,
      clearSourceAnimation = true
    }) {
      if (!fromRect || !toRect) return null;

      const flightDurationMs = Number.isFinite(ghostOptions.durationMs)
        ? ghostOptions.durationMs
        : CHIP_ANIMATION.flight.durationMs;

      const landingDelayMs = getLandingDelayMs(flightDurationMs);

      const flightAnim  = playGhostFlight(fromRect, toRect, ghostOptions);
      if (!flightAnim) return null;

      if (sourceEl && clearSourceAnimation) {
        stopElementAnimations(sourceEl);
      }

      const landingAnim = targetEl ? playChipLanding(targetEl, landingDelayMs) : null;

      return { flightAnim, landingAnim };
    }

    function waitForGhostArrivalCompletion(launched) {
      if (!launched) return Promise.resolve();
      const waits = [launched.flightAnim, launched.landingAnim]
        .filter(anim => anim && anim.finished)
        .map(anim => anim.finished.catch(() => {}));

      if (waits.length > 0) {
        return Promise.all(waits).then(() => {});
      }

      return new Promise(resolve => {
        window.setTimeout(
          resolve,
          CHIP_ANIMATION.flight.durationMs + CHIP_ANIMATION.landing.durationMs
        );
      });
    }

    function prepareGhostLandingTarget(targetEl) {
      if (!targetEl) return false;
      stopElementAnimations(targetEl);
      targetEl.style.opacity = '0';
      return true;
    }

    function animateSelectedUserChip() {
      if (!lastSelectedUserButtonRect || !els.selectedUserChip) return;

      const targetRect = getRectFromElement(els.selectedUserChip);
      if (!targetRect) {
        stopElementAnimations(els.selectedUserChip);
        return;
      }

      const selectedMetrics = getGhostChipMetrics(els.selectedUserChip);
      const html       = els.selectedUserChip.innerHTML;
      const bg         = els.selectedUserChip.style.backgroundColor || getDefaultAccentColor();
      const sourceBg   = lastSelectedUserButtonBackground || bg;
      const startWidth = lastSelectedUserButtonRect.width;
      const startScale = startWidth / targetRect.width;

      const launched = launchGhostWithLandingPop({
        fromRect: lastSelectedUserButtonRect,
        toRect:   targetRect,
        ghostOptions: {
          html,
          background: bg,
          startBackground: sourceBg,
          endBackground: bg,
          startOpacity: 0.28,
          peakOpacity: 0.82,
          peakOpacityOffset: 0.25,
          fontSizePx: selectedMetrics.fontSizePx,
          fontWeight: 400,
          paddingY:   selectedMetrics.paddingY,
          paddingX:   selectedMetrics.paddingX,
          baseWidth:  targetRect.width,
          baseHeight: targetRect.height,
          startScaleX: startScale,
          startScaleY: startScale,
          endScaleX: 1,
          endScaleY: 1
        },
        targetEl: els.selectedUserChip
      });

      if (!launched) {
        stopElementAnimations(els.selectedUserChip);
      }
    }

    function animateResultCardArrival(task) {
      if (!task || !task.originChipRect || !els.savingPresenceChip) return null;

      const toRect = getRectFromElement(els.savingPresenceChip);
      if (!toRect) return null;

      const m = getGhostChipMetrics(els.savingPresenceChip);

      const launched = launchGhostWithLandingPop({
        fromRect: task.originChipRect,
        toRect,
        ghostOptions: {
          html:       task.originChipHtml,
          background: task.color || task.originChipBackground,
          startBackground: task.originChipBackground || task.color || getDefaultAccentColor(),
          endBackground: task.color || task.originChipBackground || getDefaultAccentColor(),
          fontSizePx: m.fontSizePx,
          fontWeight: 400,
          paddingY:   m.paddingY,
          paddingX:   m.paddingX,
          baseWidth:  toRect.width,
          baseHeight: toRect.height,
          startScaleX: task.originChipRect.width  / toRect.width,
          startScaleY: task.originChipRect.height / toRect.height,
          endScaleX: 1,
          endScaleY: 1
        },
        sourceEl: els.selectedUserChip,
        targetEl: els.savingPresenceChip
      });

      if (!launched) {
        stopElementAnimations(els.savingPresenceChip);
      }

      return launched;
    }

    function getPresenceChipElement(username) {
      if (!username || !els.presenceList || !window.CSS || !CSS.escape) return null;
      return els.presenceList.querySelector(`.presenceMemberChip[data-username="${CSS.escape(username)}"]`);
    }

    function getPresenceChipSnapshot(username) {
      const chip = getPresenceChipElement(username);
      const rect = getRectFromElement(chip);
      if (!chip || !rect) return null;

      const metrics = getGhostChipMetrics(chip);
      const bg = chip.style.backgroundColor || getComputedStyle(chip).backgroundColor || getDefaultAccentColor();
      const group = chip.closest('.presenceGroup');

      return {
        rect,
        html: chip.innerHTML,
        background: bg,
        fontSizePx: metrics.fontSizePx,
        paddingY: metrics.paddingY,
        paddingX: metrics.paddingX,
        locationId: group ? (group.dataset.locationId || '') : ''
      };
    }

    function animateSavedChipToPresence(task) {
      if (!task || !task.username || !els.savingPresenceChip) return false;

      const sourceSnapshot = task.previousPresenceChipSnapshot || null;
      const fromRect   = sourceSnapshot
        ? sourceSnapshot.rect
        : getRectFromElement(els.savingPresenceChip);
      const targetChip = getPresenceChipElement(task.username);
      const toRect     = getRectFromElement(targetChip);

      if (!fromRect || !toRect) return false;

      const isSamePresenceLocation =
        sourceSnapshot &&
        sourceSnapshot.locationId &&
        task.locationId &&
        sourceSnapshot.locationId === task.locationId;

      if (isSamePresenceLocation || (sourceSnapshot && areRectsNearlySame(sourceSnapshot.rect, toRect))) {
        playChipSamePlaceBounce(targetChip);
        return true;
      }

      const targetMetrics = getGhostChipMetrics(targetChip);
      const sourceColor =
        (sourceSnapshot && sourceSnapshot.background) ||
        els.savingPresenceChip.style.backgroundColor ||
        getDefaultAccentColor();
      const destinationColor =
        (targetChip && (targetChip.style.backgroundColor || getComputedStyle(targetChip).backgroundColor)) ||
        normalizeHexColor(task.color) ||
        getDefaultAccentColor();

      const launched = launchGhostWithLandingPop({
        fromRect,
        toRect,
        ghostOptions: {
          html:       targetChip.innerHTML,
          background: destinationColor,
          startBackground: sourceColor,
          endBackground: destinationColor,
          startOpacity: sourceSnapshot ? 0.28 : CHIP_ANIMATION.flight.startOpacity,
          peakOpacity: sourceSnapshot ? 0.82 : null,
          peakOpacityOffset: 0.25,
          fontSizePx: targetMetrics.fontSizePx,
          fontWeight: 400,
          paddingY:   targetMetrics.paddingY,
          paddingX:   targetMetrics.paddingX,
          baseWidth:  toRect.width,
          baseHeight: toRect.height,
          startScaleX: fromRect.width  / toRect.width,
          startScaleY: fromRect.height / toRect.height,
          endScaleX: 1,
          endScaleY: 1
        },
        sourceEl: task.previousPresenceChipSnapshot ? null : els.savingPresenceChip,
        targetEl: targetChip,
        clearSourceAnimation: false
      });

      if (!launched) {
        stopElementAnimations(els.savingPresenceChip);
        stopElementAnimations(targetChip);
      }

      return !!launched;
    }

    function loadPresenceFontLevel() {
      try {
        const saved = Number(localStorage.getItem(PRESENCE_FONT_LEVEL_KEY));
        presenceFontLevel = (Number.isInteger(saved) && saved >= PRESENCE_FONT_MIN && saved <= PRESENCE_FONT_MAX)
          ? saved
          : PRESENCE_FONT_DEFAULT;
      } catch (_) {
        presenceFontLevel = PRESENCE_FONT_DEFAULT;
      }
    }

    function savePresenceFontLevel() {
      try { localStorage.setItem(PRESENCE_FONT_LEVEL_KEY, String(presenceFontLevel)); } catch (_) {}
    }

    function applyPresenceFontLevel() {
      const sizes = PRESENCE_FONT_SIZE_MAP[presenceFontLevel] || PRESENCE_FONT_SIZE_MAP[PRESENCE_FONT_DEFAULT];

      document.documentElement.style.setProperty('--presence-location-size', `${sizes.location}px`);
      document.documentElement.style.setProperty('--presence-members-size',  `${sizes.members}px`);

      if (els.presenceFontMinus) els.presenceFontMinus.disabled = (presenceFontLevel <= PRESENCE_FONT_MIN);
      if (els.presenceFontPlus)  els.presenceFontPlus.disabled  = (presenceFontLevel >= PRESENCE_FONT_MAX);
    }

    function changePresenceFontLevel(delta) {
      const next = clamp(presenceFontLevel + delta, PRESENCE_FONT_MIN, PRESENCE_FONT_MAX);
      if (next === presenceFontLevel) return;
      presenceFontLevel = next;
      savePresenceFontLevel();
      applyPresenceFontLevel();
    }

    function loadButtonSizeLevel() {
      try {
        const saved = Number(localStorage.getItem(BUTTON_SIZE_LEVEL_KEY));
        buttonSizeLevel = (Number.isInteger(saved) && saved >= BUTTON_SIZE_MIN && saved <= BUTTON_SIZE_MAX)
          ? saved
          : BUTTON_SIZE_DEFAULT;
      } catch (_) {
        buttonSizeLevel = BUTTON_SIZE_DEFAULT;
      }
    }

    function saveButtonSizeLevel() {
      try { localStorage.setItem(BUTTON_SIZE_LEVEL_KEY, String(buttonSizeLevel)); } catch (_) {}
    }

    function applyButtonSizeLevel() {
      const sizes = BUTTON_SIZE_MAP[buttonSizeLevel] || BUTTON_SIZE_MAP[BUTTON_SIZE_DEFAULT];

      document.documentElement.style.setProperty('--button-font-size',      `${sizes.font}px`);
      document.documentElement.style.setProperty('--button-min-height',     `${sizes.minHeight}px`);
      document.documentElement.style.setProperty('--button-padding-y',      `${sizes.py}px`);
      document.documentElement.style.setProperty('--button-padding-x',      `${sizes.px}px`);
      document.documentElement.style.setProperty('--button-min-col-width',  `${sizes.minCol}px`);

      if (els.buttonSizeMinus) els.buttonSizeMinus.disabled = (buttonSizeLevel <= BUTTON_SIZE_MIN);
      if (els.buttonSizePlus)  els.buttonSizePlus.disabled  = (buttonSizeLevel >= BUTTON_SIZE_MAX);
    }

    function changeButtonSizeLevel(delta) {
      const next = clamp(buttonSizeLevel + delta, BUTTON_SIZE_MIN, BUTTON_SIZE_MAX);
      if (next === buttonSizeLevel) return;
      buttonSizeLevel = next;
      saveButtonSizeLevel();
      applyButtonSizeLevel();
    }

    function reloadUiPreferences() {
      loadPresenceFontLevel();
      applyPresenceFontLevel();
      loadButtonSizeLevel();
      applyButtonSizeLevel();
    }

    function setHeader(titleJa, titleEn) {
      if (!els.title) return;

      els.title.innerHTML = formatBilingualLines(titleJa, titleEn);
    }

    function showSelectedUser(user) {
      if (!els.buttonSizeControls || !els.selectedUserChipContainer) return;

      if (!user) {
        els.buttonSizeControls.classList.remove('hidden');
        setSelectedUserChipHidden(true);
        return;
      }

      els.buttonSizeControls.classList.add('hidden');
      setSelectedUserChipHidden(false);

      els.selectedUserChip.innerHTML = formatBilingualInline(user.nameJa, user.nameEn);

      const colorMap = getUserLocationColorMap();
      const userColor = colorMap.get(user.username);

      els.selectedUserChip.style.backgroundColor = '';
      els.selectedUserChip.classList.remove('secondary');

      if (userColor) {
        els.selectedUserChip.style.backgroundColor = userColor;
      } else {
        els.selectedUserChip.classList.add('secondary');
      }
    }

    function hideResultView() {
      els.resultView.classList.add('hidden');
      els.buttonGrid.classList.remove('hidden');
      hideSyncIndicator();
      hideSavingPresenceView();
      els.resultCard.classList.add('hidden');
      hideResultActionButton();
    }

    // onclick プロパティの上書きを避け、addEventListener + 都度解除で管理
    function showResultActionButton(onClick) {
      els.resultActions.classList.remove('hidden');
      const handler = () => {
        playTapSound();
        onClick();
      };
      els.resultOkBtn._actionHandler = handler;
      els.resultOkBtn.addEventListener('click', handler);
    }

    function hideResultActionButton() {
      els.resultActions.classList.add('hidden');
      if (els.resultOkBtn._actionHandler) {
        els.resultOkBtn.removeEventListener('click', els.resultOkBtn._actionHandler);
        els.resultOkBtn._actionHandler = null;
      }
    }

    function clearSavingPresenceLocationTimer() {
      if (savingPresenceLocationTimer) {
        clearTimeout(savingPresenceLocationTimer);
        savingPresenceLocationTimer = null;
      }
    }

    function resetSavingPresenceGroupFade() {
      stopElementAnimations(els.savingPresenceGroup);
      stopElementAnimations(els.savingPresenceLocation);
      stopElementAnimations(els.savingPresenceMembers);
      stopElementAnimations(els.savingPresenceChip);
    }

    function fadeOutSavingPresenceGroup() {
      if (!els.savingPresenceLocation && !els.savingPresenceChip) return null;

      stopElementAnimations(els.savingPresenceLocation);
      stopElementAnimations(els.savingPresenceChip);

      const endTransform = 'translateY(-4px) scale(0.985)';
      const durationMs =
        CHIP_ANIMATION.flight.durationMs +
        CHIP_ANIMATION.landing.durationMs -
        CHIP_ANIMATION.timing.overlapMs;

      const locationAnim = startElementAnimation(
        els.savingPresenceLocation,
        [
          { opacity: 1, transform: 'translateY(0) scale(1)', offset: 0 },
          { opacity: 1, transform: 'translateY(0) scale(1)', offset: 0.60 },
          { opacity: 0, transform: endTransform, offset: 1 }
        ],
        {
          duration: durationMs,
          easing: CHIP_ANIMATION.flight.easing,
          fill: 'forwards'
        }
      );

      const nameAnim = startElementAnimation(
        els.savingPresenceChip,
        [
          { opacity: 1, transform: 'translateY(0) scale(1)', offset: 0 },
          { opacity: 1, transform: 'translateY(0) scale(1)', offset: 0.60 },
          { opacity: 0, transform: endTransform, offset: 1 }
        ],
        {
          duration: durationMs,
          easing: CHIP_ANIMATION.flight.easing,
          fill: 'forwards'
        }
      );

      return nameAnim || locationAnim;
    }

    function setSavingPresenceLocationPending(isPending) {
      if (!els.savingPresenceLocationName) return;
      const locationRow = els.savingPresenceLocationName.closest('.savingPresenceLocation');
      if (!locationRow) return;
      locationRow.classList.toggle('is-pending', !!isPending);
    }

    function revealSavingPresenceLocation(delayMs = 0) {
      clearSavingPresenceLocationTimer();

      if (delayMs > 0) {
        savingPresenceLocationTimer = setTimeout(() => {
          setSavingPresenceLocationPending(false);
          savingPresenceLocationTimer = null;
        }, delayMs);
      } else {
        savingPresenceLocationTimer = setTimeout(() => {
          setSavingPresenceLocationPending(false);
          savingPresenceLocationTimer = null;
        }, 0);
      }
    }

    function hideSavingPresenceView() {
      clearSavingPresenceLocationTimer();
      resetSavingPresenceGroupFade();
      setSavingPresenceLocationPending(true);
      hideSyncIndicator();
      if (els.savingPresenceView) els.savingPresenceView.classList.add('hidden');
    }

    function showSavingPresenceView({
      user,
      location,
      holdLocation = false,
      revealLocationAfterMs = 0
    }) {
      if (!els.savingPresenceView) return;

      resetSavingPresenceGroupFade();

      els.buttonGrid.classList.add('hidden');
      els.resultView.classList.remove('hidden');
      els.resultCard.classList.add('hidden');
      els.savingPresenceView.classList.remove('hidden');
      hideSyncIndicator();
      hideResultActionButton();

      const color = normalizeHexColor(location && location.color) || getDefaultAccentColor();
      stopElementAnimations(els.savingPresenceChip);

      if (els.savingPresenceLocationName) {
        els.savingPresenceLocationName.innerHTML = renderSavingLocationHtml(location);
      }
      if (els.savingPresenceChip) {
        els.savingPresenceChip.innerHTML = formatBilingualInline(user && user.nameJa, user && user.nameEn);
        els.savingPresenceChip.style.backgroundColor = color;
      }

      setSavingPresenceLocationPending(!!holdLocation);

      if (holdLocation) {
        revealSavingPresenceLocation(revealLocationAfterMs);
      } else {
        clearSavingPresenceLocationTimer();
      }
    }

    function showResultView({
      ok = true,
      locationJa = '',
      locationEn = '',
      nameJa = '',
      nameEn = '',
      subJa = '',
      subEn = '',
      cardBg = '',
      statusError = '',
      inline = false,
      subIsDanger = false
    }) {
      els.buttonGrid.classList.add('hidden');
      els.resultView.classList.remove('hidden');
      hideSavingPresenceView();
      els.resultCard.classList.remove('hidden');

      els.resultStatus.className = 'resultStatus ' + (statusError ? 'error' : 'hidden');
      if (typeof statusError === 'string' && statusError.includes('<br>')) {
        const [statusJa, statusEn] = statusError.split('<br>');
        els.resultStatus.innerHTML = formatBilingualLines(statusJa || '', statusEn || '');
      } else {
        els.resultStatus.innerHTML = statusError;
      }

      if (inline) {
        els.resultName.innerHTML     = formatBilingualInline(nameJa, nameEn);
        els.resultLocation.innerHTML = formatBilingualInline(locationJa, locationEn);
      } else {
        els.resultName.innerHTML     = formatBilingualLines(nameJa, nameEn);
        els.resultLocation.innerHTML = formatBilingualLines(locationJa, locationEn);
      }

      if (subJa || subEn) {
        els.resultSub.classList.remove('hidden');
        els.resultSub.classList.toggle('resultSub--danger', !!subIsDanger);
        els.resultSub.textContent = `${subJa}${subJa && subEn ? '\n\n' : ''}${subEn}`;
      } else {
        els.resultSub.classList.add('hidden');
        els.resultSub.classList.remove('resultSub--danger');
        els.resultSub.textContent = '';
      }

      // getDefaultAccentColor() を共通関数として使用（重複実装を排除）
      const defaultBg = getDefaultAccentColor();

      if (ok) {
        const bg     = normalizeHexColor(cardBg) || defaultBg;
        const border = adjustHexColor(bg, -24)   || bg;

        els.resultCard.style.background    = bg;
        els.resultCard.style.borderColor   = border;
        els.resultCard.style.boxShadow     = '0 10px 24px rgba(0,0,0,0.12)';
        // CSS カスタムプロパティ経由で色値を参照
        els.resultName.style.color         = 'var(--result-ok-text)';
        els.resultLocation.style.color     = 'var(--result-ok-text)';
        els.resultSub.style.color          = 'var(--result-ok-text)';
      } else {
        els.resultCard.style.background    = 'var(--result-error-bg)';
        els.resultCard.style.borderColor   = 'var(--result-error-border)';
        els.resultCard.style.boxShadow     = 'var(--result-error-shadow)';
        els.resultName.style.color         = 'var(--result-error-text)';
        els.resultLocation.style.color     = 'var(--result-error-text)';
        els.resultSub.style.color          = subIsDanger
          ? 'var(--danger)'
          : 'var(--result-error-sub)';
      }
    }

    function setButtons(items, onClick, opts = {}) {
      const { addBackButton = false, type = 'user' } = opts;
      els.buttonGrid.innerHTML = '';
      els.buttonGrid.dataset.viewType = type;

      const fragment        = document.createDocumentFragment();
      const colorMap        = (type === 'user') ? getUserLocationColorMap() : null;
      const currentLocationId = (type === 'location' && selectedUser)
        ? getUserLocationId(selectedUser.username)
        : '';

      items.forEach(item => {
        const btn = document.createElement('button');
        btn.type      = 'button';
        btn.className = 'btn';

        const mainLineHtml = (type === 'location')
          ? renderLocationButtonMainLineHtml(item)
          : escapeHtml(item.ja || item.nameJa);

        btn.innerHTML = `<span class="btn-main-line">${mainLineHtml}</span>` +
                        `<span class="btn-sub-line en-text">${escapeHtml(item.en || item.nameEn)}</span>`;

        if (type === 'location') {
          btn.dataset.locationId = item.id || '';
          const bg = normalizeHexColor(item.color);
          if (bg) btn.style.backgroundColor = bg;
          if (item.id && item.id === currentLocationId) {
            btn.classList.add('is-current-location');
            btn.setAttribute(
              'aria-label',
              `現在地: ${item.ja || item.en || item.id}`
            );
          }
        } else if (type === 'user') {
          btn.dataset.username = item.username || '';
          const bg = colorMap.get(item.username);
          if (bg) {
            btn.style.backgroundColor = bg;
          } else {
            btn.classList.add('secondary');
          }
        }

        attachPressFeedback(btn);
        btn.addEventListener('click', () => {
          const rect = getRectFromElement(btn);
          if (type === 'user') {
            lastSelectedUserButtonRect       = rect;
            lastSelectedUserButtonBackground = btn.style.backgroundColor || getComputedStyle(btn).backgroundColor || getDefaultAccentColor();
          }
          playTapSound();
          onClick(item);
        });
        fragment.appendChild(btn);
      });

      if (addBackButton) {
        const back = document.createElement('button');
        back.type      = 'button';
        back.className = 'btn secondary';
        back.innerHTML = '<span class="btn-main-line">戻る</span><span class="btn-sub-line en-text">Back</span>';
        attachPressFeedback(back);
        back.addEventListener('click', () => {
          playTapSound();
          renderUserSelection();
        });
        fragment.appendChild(back);
      }

      els.buttonGrid.appendChild(fragment);
    }

    function renderPresence() {
      els.presenceList.innerHTML = '';
      const fragment      = document.createDocumentFragment();
      const defaultAccent = getDefaultAccentColor();

      const colorMap = new Map((appData.locations || []).map(l => [l.id, l.color || '']));
      const iconMap  = new Map((appData.locations || []).map(l => [l.id, l.icon  || '']));

      (appData.presence || []).forEach(group => {
        const wrapper = document.createElement('div');
        wrapper.className = 'presenceGroup';
        wrapper.dataset.locationId = group.locationId || '';

        const title = document.createElement('div');
        title.className = 'presenceLocation';

        const locationColor = normalizeHexColor(colorMap.get(group.locationId));
        const locationIcon  = iconMap.get(group.locationId) || '';
        const memberCount   = group.members ? group.members.length : 0;

        title.innerHTML =
          `<span class="loc-name">${renderPresenceLocationHtml(group.locationJa, group.locationEn, locationIcon, locationColor || defaultAccent)}</span>` +
          `<span class="loc-count">${memberCount}</span>`;

        wrapper.appendChild(title);

        if (group.members && group.members.length > 0) {
          const members = document.createElement('div');
          members.className = 'presenceMembers';

          group.members.forEach(m => {
            const chip = document.createElement('span');
            chip.className = 'nameChip nameChip--presence presenceMemberChip';
            chip.dataset.username = m.username || '';
            chip.innerHTML = formatBilingualInline(m.nameJa, m.nameEn);
            chip.style.backgroundColor = locationColor || defaultAccent;
            if (pendingLandingUsername && m.username === pendingLandingUsername) {
              chip.style.opacity = '0';
            }
            members.appendChild(chip);
          });

          wrapper.appendChild(members);
        }

        fragment.appendChild(wrapper);
      });

      els.presenceList.appendChild(fragment);
    }

    function updatePresenceIfChanged(presence) {
      const signature = getPresenceSignature(presence);
      if (signature === lastPresenceJson) return;

      lastPresenceJson    = signature;
      appData.presence    = presence || [];
      // presence 更新時にキャッシュを無効化
      invalidateUserLocationColorCache();
      renderPresence();
      refreshUserButtonsIfNeeded();
    }

    function fetchPresenceNow() {
      if (isPresenceFetchRunning) return;
      isPresenceFetchRunning = true;
      const requestVersion = presenceFetchVersion;

      google.script.run
        .withSuccessHandler(presence => {
          isPresenceFetchRunning = false;
          if (requestVersion !== presenceFetchVersion) return;
          updatePresenceIfChanged(presence);
        })
        .withFailureHandler(err => {
          isPresenceFetchRunning = false;
          if (requestVersion !== presenceFetchVersion) return;
          console.warn('getPresenceData failed', err);
        })
        .getPresenceData();
    }

    function startPresencePolling() {
      if (presencePollTimer) return;
      presencePollTimer = setInterval(fetchPresenceNow, POLL_INTERVAL_MS);
    }

    function stopPresencePolling() {
      if (!presencePollTimer) return;
      clearInterval(presencePollTimer);
      presencePollTimer = null;
    }

    function handleVisibilityChange() {
      if (document.visibilityState === 'visible') {
        reloadUiPreferences();
        fetchPresenceNow();
        startPresencePolling();
      } else {
        stopPresencePolling();
      }
    }

    function resetSelectionScrollPosition() {
      if (els.buttonGrid) els.buttonGrid.scrollTo({ top: 0, behavior: 'auto' });
      if (els.resultView) els.resultView.scrollTo({ top: 0, behavior: 'auto' });
      window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
    }

    function scheduleReset(ms = 1800) {
      clearResetTimer();
      resetTimer = setTimeout(renderUserSelection, ms);
    }

    function renderUserSelection() {
      clearResetTimer();

      selectedUser = null;
      isUiLocked   = false;
      els.buttonGrid.classList.remove('is-busy');
      showSelectedUser(null);
      hideResultView();
      renderPresence();

      setHeader('名前を選択', 'Select Name');
      setButtons(appData.users, user => {
        selectedUser = user;
        renderLocationSelection();
      }, { type: 'user' });

      resetSelectionScrollPosition();
    }

    function renderLocationSelection() {
      clearResetTimer();

      isUiLocked = false;
      els.buttonGrid.classList.remove('is-busy');
      showSelectedUser(selectedUser);
      if (lastSelectedUserButtonRect) prepareGhostLandingTarget(els.selectedUserChip);
      hideResultView();

      setHeader('場所を選択', 'Select Location');
      setButtons(appData.locations, submitLocation, { addBackButton: true, type: 'location' });

      resetSelectionScrollPosition();
      scheduleAnimationStart(() => animateSelectedUserChip());
      scheduleReset(10000);
    }

    function submitLocation(location) {
      if (isUiLocked || !selectedUser || !location) return;
      clearResetTimer();

      isUiLocked = true;
      els.buttonGrid.classList.add('is-busy');
      presenceFetchVersion += 1;
      stopPresencePolling();

      setHeader('送信中です', 'Saving...');

      const selectedChipRect = els.selectedUserChip ? getRectFromElement(els.selectedUserChip) : null;
      const selectedChipHtml = els.selectedUserChip
        ? els.selectedUserChip.innerHTML
        : formatBilingualInline(selectedUser.nameJa, selectedUser.nameEn);
      const selectedChipBg   = els.selectedUserChip
        ? (els.selectedUserChip.style.backgroundColor || getComputedStyle(els.selectedUserChip).backgroundColor || getDefaultAccentColor())
        : getDefaultAccentColor();

      showSavingPresenceView({
        user:     selectedUser,
        location,
        holdLocation:         true,
        revealLocationAfterMs: SAVING_LOCATION_REVEAL_AFTER_START_MS
      });
      const preparedSavingChipLanding = prepareGhostLandingTarget(els.savingPresenceChip);

      let resolvePresenceScrollReady = () => {};
      const presenceScrollPromise = new Promise(resolve => {
        resolvePresenceScrollReady = resolve;
      });

      scheduleAnimationStart(() => {
        const launched = animateResultCardArrival({
          originChipRect:       selectedChipRect,
          originChipHtml:       selectedChipHtml,
          originChipBackground: selectedChipBg,
          color:                location.color
        });

        if (!launched && preparedSavingChipLanding) {
          stopElementAnimations(els.savingPresenceChip);
        }

        waitForGhostArrivalCompletion(launched).then(() => {
          if (queuedTask.cancelPresenceScroll) {
            resolvePresenceScrollReady();
            return;
          }
          scrollPresencePanelForSave(queuedTask).then(() => {
            if (!queuedTask.cancelPresenceScroll) {
              showSyncIndicator(queuedTask);
            }
            resolvePresenceScrollReady();
          });
        });
      });

      setSelectedUserChipHidden(true);

      const queuedTask = {
        username:   selectedUser.username,
        nameJa:     selectedUser.nameJa,
        nameEn:     selectedUser.nameEn,
        locationId: location.id,
        locationJa: location.ja,
        locationEn: location.en,
        icon:       location.icon,
        color:      location.color,
        presenceScrollPromise,
        cancelPresenceScroll: false
      };

      syncQueue.push(queuedTask);
      processQueue();
    }

    function processQueue() {
      if (isQueueProcessing || isQueuePaused || syncQueue.length === 0) return;

      isQueueProcessing = true;
      const task      = syncQueue[0];
      const requestId = ++saveRequestSeq;
      activeSaveRequestId = requestId;

      clearSaveWatchdogTimer();
      saveWatchdogTimer = setTimeout(() => handleSaveTimeout(task, requestId), SAVE_TIMEOUT_MS);

      google.script.run
        .withSuccessHandler(res => {
          if (requestId !== activeSaveRequestId) return;
          clearActiveSaveRequest();

          syncQueue.shift();
          isQueueProcessing = false;

          const shouldCompleteVisibleTask =
            selectedUser && selectedUser.username === task.username && isUiLocked;
          if (shouldCompleteVisibleTask) {
            playSaveSuccessSound();
            setHeader('記録しました', 'Saved');
            setSelectedUserChipHidden(true);
          }

          const scrollReady = task.presenceScrollPromise || Promise.resolve();
          scrollReady.then(() => {
            task.previousPresenceChipSnapshot = getPresenceChipSnapshot(task.username);
            const shouldHideLandingChip =
              shouldCompleteVisibleTask &&
              (!task.previousPresenceChipSnapshot ||
               !task.previousPresenceChipSnapshot.locationId ||
               task.previousPresenceChipSnapshot.locationId !== task.locationId);

            pendingLandingUsername = shouldHideLandingChip ? task.username : '';
            updatePresenceIfChanged(res.presence);
            pendingLandingUsername = '';
            highlightPresenceGroup(task.locationId, task.color);

            if (shouldCompleteVisibleTask) {
              showSavingPresenceView({
                user:     { nameJa: task.nameJa, nameEn: task.nameEn },
                location: { ja: task.locationJa, en: task.locationEn, icon: task.icon, color: task.color },
                holdLocation: false
              });
              if (!isPresencePanelBelowMainFlow()) {
                showSyncIndicator(task, 'done');
              }

              scheduleAnimationStart(() => {
                const didAnimate = animateSavedChipToPresence(task);
                if (didAnimate) {
                  fadeOutSavingPresenceGroup();
                } else if (shouldHideLandingChip) {
                  const targetChip = getPresenceChipElement(task.username);
                  if (targetChip) stopElementAnimations(targetChip);
                }
              });

              scheduleReset(CHIP_ANIMATION.flight.durationMs + CHIP_ANIMATION.landing.durationMs + 80);
            } else {
              hideSyncIndicator();
            }

            startPresencePolling();
            processQueue();
          });
        })
        .withFailureHandler(err => {
          if (requestId !== activeSaveRequestId) return;
          clearActiveSaveRequest();

          isQueueProcessing = false;
          syncQueue.shift();
          isQueuePaused = true;
          isUiLocked    = true;
          task.cancelPresenceScroll = true;

          clearResetTimer();

          const msg            = extractErrorText(err);
          const isLockConflict = (msg.reason === 'lock');

          playSaveErrorSound();
          setHeader('エラーが発生しました', 'Error');
          setSelectedUserChipHidden(true);

          showResultView({
            ok: false,
            statusError: isLockConflict
              ? '今回は保存されませんでした<br>Not saved this time'
              : '保存に失敗しました<br>Failed to save',
            nameJa:     task.nameJa,
            nameEn:     task.nameEn,
            locationJa: task.locationJa,
            locationEn: task.locationEn,
            subJa: isLockConflict
              ? 'ほかの保存処理と重なったため、今回は保存されませんでした。［戻る］を押して、少し待ってからもう一度選択してください。'
              : msg.ja,
            subEn: isLockConflict
              ? 'This action was not saved because another save was in progress. Press [Back], wait a moment, and then select again.'
              : msg.en,
            inline:     true,
            subIsDanger: isLockConflict
          });
          scrollLeftPanelForError();

          startPresencePolling();

          showResultActionButton(() => {
            isQueuePaused = false;
            isUiLocked    = false;
            renderUserSelection();
            processQueue();
          });
        })
        .saveLocation(task.username, task.locationId, appData.terminalName);
    }

    function showInitializationError({
      headerJa,
      headerEn,
      nameJa,
      nameEn,
      locationJa = '',
      locationEn = '',
      subJa = '',
      subEn = ''
    }) {
      setHeader(headerJa, headerEn);
      showSelectedUser(null);
      showResultView({ ok: false, nameJa, nameEn, locationJa, locationEn, subJa, subEn });
    }

    window.addEventListener('load', () => {
      initDOM();
      bindStaticPressFeedback();
      bindStaticControlEvents();

      loadPresenceFontLevel();
      applyPresenceFontLevel();

      loadButtonSizeLevel();
      applyButtonSizeLevel();

      if (INJECTED_DATA && !INJECTED_DATA.error) {
        appData          = INJECTED_DATA;
        lastPresenceJson = getPresenceSignature(appData.presence || []);
        renderUserSelection();

        document.addEventListener('visibilitychange', handleVisibilityChange);

        // pageshow は BFCache 復元時のみ処理する。通常の復帰は visibilitychange でカバー済み
        window.addEventListener('pageshow', e => {
          if (e.persisted) reloadUiPreferences();
        });

        window.addEventListener('beforeunload', () => {
          clearSaveWatchdogTimer();
          stopPresencePolling();
        });

        if (document.visibilityState === 'visible') {
          fetchPresenceNow();
          startPresencePolling();
        }
      } else {
        const rawError = INJECTED_DATA && INJECTED_DATA.error
          ? String(INJECTED_DATA.error)
          : 'データが見つかりません';

        // より具体的な文字列を先に判定する
        if (rawError.includes('current_presence: duplicate username')) {
          const duplicatedId = rawError.split(':').pop().trim() || '不明';
          showInitializationError({
            headerJa:   '設定エラー',
            headerEn:   'Configuration Error',
            nameJa:     'current_presence に',
            nameEn:     '重複した username があります。',
            locationJa: `エラー対象: ${duplicatedId}`,
            subJa:      '【解決方法】\ncurrent_presence シートを確認し、\n同じ username の重複行を解消してください。\n必要なら logs_ シートから再構築してください。'
          });
        } else if (rawError.includes('duplicate username')) {
          const duplicatedId = rawError.split(':').pop().trim() || '不明';
          showInitializationError({
            headerJa:   '設定エラー',
            headerEn:   'Configuration Error',
            nameJa:     'メンバーのID（username）が',
            nameEn:     '重複しています。',
            locationJa: `エラー対象: ${duplicatedId}`,
            subJa:      '【解決方法】\nスプレッドシートの users シートを開き、\n全員のIDが別々になるように修正してから\nこの画面を再読み込み（リロード）してください。'
          });
        } else if (rawError.includes('duplicate location_id')) {
          const duplicatedId = rawError.split(':').pop().trim() || '不明';
          showInitializationError({
            headerJa:   '設定エラー',
            headerEn:   'Configuration Error',
            nameJa:     '場所のID（location_id）が',
            nameEn:     '重複しています。',
            locationJa: `エラー対象: ${duplicatedId}`,
            subJa:      '【解決方法】\nスプレッドシートの locations シートを開き、\n各場所のIDが重複しないように修正してから\nこの画面を再読み込み（リロード）してください。'
          });
        } else {
          showInitializationError({
            headerJa: '初期化に失敗しました',
            headerEn: 'Initialization Failed',
            nameJa:   'スプレッドシートの',
            nameEn:   '読み込みエラー',
            subJa:    `【エラー詳細】\n${rawError}\n\nシステム管理者に連絡するか、\n画面を再読み込みしてください。`
          });
        }
      }
    });
  </script>
  <? } ?>
</body>
